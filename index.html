// Multi-category matching
function matchesCat(g, catName){
  if(catName==="All")return true;
  const t=g.tags||"";
  const map={"Action":"action","Shooting":"shooting,fps,sniper","Racing":"racing,drift,car,driving,bike,stunt","Arcade":"arcade,parkour,running,skill","Sports":"sports,soccer,basketball,pool","Puzzle":"puzzle,brain,card","Multiplayer":"multiplayer,io","Survival":"survival,crafting","Sandbox":"sandbox,minecraft,building","Strategy":"strategy,tower-defense","Simulator":"simulator,cooking,flying","Casual":"casual,fun,girl,idle","2 Player":"2player","Horror":"horror","IO Games":"io","Clicker":"clicker,idle"};
  const keys=(map[catName]||"").split(",");
  return keys.some(k=>t.includes(k));
}

// Seeded shuffle for consistent layout per session
function seededShuffle(arr,seed){
  const a=[...arr];let s=seed;
  for(let i=a.length-1;i>0;i--){s=(s*16807+0)%2147483647;const j=s%i;[a[i],a[j]]=[a[j],a[i]]}
  return a;
}

// Distribute featured cards evenly through grid
function buildSizedList(games){
  const shuffled=seededShuffle(games,42);
  const total=shuffled.length;
  // Determine how many big/medium cards based on total games
  const numBig=Math.min(3,Math.max(1,Math.floor(total/10)));
  const numMed=Math.min(8,Math.max(2,Math.floor(total/5)));
  // Pick indices to promote - spread evenly
  const bigIndices=new Set();
  const medIndices=new Set();
  for(let i=0;i<numBig;i++){
    const idx=Math.floor((i+1)*total/(numBig+1));
    bigIndices.add(idx);
  }
  for(let i=0;i<numMed;i++){
    const idx=Math.floor((i+1)*total/(numMed+1));
    if(!bigIndices.has(idx))medIndices.add(idx);
  }
  return shuffled.map((g,i)=>{
    let sz="";
    if(bigIndices.has(i))sz="col3";
    else if(medIndices.has(i))sz="col2";
    return{...g,sz};
  });
}

const CSS=`*{margin:0;padding:0;box-sizing:border-box}

/* HEADER */
.hdr{height:52px;background:rgba(14,26,46,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;z-index:100;flex-shrink:0}

.sb-item{display:flex;align-items:center;gap:10px;padding:8px 0 8px 16px;cursor:pointer;color:var(--text2);font-size:13px;font-weight:600;transition:all .12s;border-left:3px solid transparent;margin:1px 0;white-space:nowrap;overflow:hidden}
.sb-item:hover{background:var(--accent-glow);color:var(--accent)}
.sb-item.active{background:linear-gradient(90deg,rgba(79,195,247,.15),transparent);color:var(--accent);border-left-color:var(--accent)}
.sb-item svg{flex-shrink:0;min-width:20px;opacity:.7}
.sb-item.active svg,.sb-item:hover svg{opacity:1}
.sb-name{opacity:0;transition:opacity .15s ease;margin-left:2px}
.sidebar:hover .sb-name{opacity:1}
.sb-count{margin-left:auto;padding-right:12px;font-size:11px;color:var(--text3);font-weight:500;opacity:0;transition:opacity .15s ease}
.sidebar:hover .sb-count{opacity:1}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:12px;-webkit-overflow-scrolling:touch}

/* DENSE GRID */
.game-grid{display:grid;grid-auto-flow:dense;gap:8px;grid-template-columns:repeat(3,130px);grid-auto-rows:130px;width:fit-content;max-width:100%;margin:0 auto;list-style:none}
.col2{grid-column:span 2;grid-row:span 2}
.col3{grid-column:span 3;grid-row:span 3}

/* GAME CARD with cropped bottom */
.gc{position:relative;overflow:hidden;border-radius:var(--r);cursor:pointer}
.gc-inner{position:relative;width:100%;height:100%;overflow:hidden;border-radius:var(--r);transition:transform .2s ease,box-shadow .2s ease}
.gc:hover .gc-inner{transform:scale(1.02);box-shadow:0 12px 28px rgba(0,0,0,.3)}
.gc img{width:100%;height:115%;object-fit:cover;display:block;position:absolute;top:0;left:0}
.gc-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.9),rgba(0,0,0,.55) 25%,rgba(0,0,0,.15) 40%,transparent 50%);opacity:0;transition:opacity .2s ease;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;padding:10px;z-index:2;border-radius:var(--r)}
.gc:hover .gc-ov{opacity:1}
.gc-title{color:#fff;font-weight:700;font-size:13px;text-align:center;line-height:1.2;text-shadow:0 2px 8px rgba(0,0,0,.5)}
.col3 .gc-title{font-size:18px}
.col2 .gc-title{font-size:15px}
/* Hover zoom animation as "video preview" effect */
.gc:hover img{animation:hoverZoom 3s ease-in-out infinite alternate}
@keyframes hoverZoom{0%{transform:scale(1) translate(0,0)}25%{transform:scale(1.08) translate(-2%,-1%)}50%{transform:scale(1.12) translate(1%,-2%)}75%{transform:scale(1.06) translate(-1%,1%)}100%{transform:scale(1.1) translate(2%,-1%)}}
@media(hover:none){.gc .gc-ov{opacity:1;background:linear-gradient(to top,rgba(0,0,0,.7) 0%,transparent 35%)}}

/* GAME PAGE */
.gp{animation:fu .2s ease}@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.gp-top{max-width:900px;margin:0 auto}
.bk{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;color:var(--text2);cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;margin-bottom:12px;transition:all .15s}
.bk:hover{color:var(--accent);border-color:var(--accent);background:var(--accent-glow)}
.gf{width:100%;aspect-ratio:16/9;background:#000;border-radius:var(--r);overflow:hidden;position:relative;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.gf iframe{width:100%;height:100%;border:0}
.gf.fs{position:fixed;inset:0;z-index:9999;border-radius:0;aspect-ratio:unset}
.ga{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.ab{display:flex;align-items:center;gap:5px;padding:8px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:20px;color:var(--text);cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;transition:all .12s}
.ab:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-glow)}
.ab.on{color:var(--accent);border-color:var(--accent);background:var(--accent-glow)}
.ab.dis{color:#ef5350;border-color:#ef5350;background:rgba(239,83,80,.1)}
.ab .cnt{font-weight:800;font-size:13px}
.gi{margin-top:12px;padding:16px;background:var(--bg2);border-radius:var(--r);border:1px solid var(--border)}
.gi h2{font-size:18px;font-weight:800;margin-bottom:6px}
.gi p{font-size:13px;color:var(--text2);line-height:1.6}
.gi-stats{display:flex;gap:10px;margin-top:12px}
.gi-stat{padding:8px 14px;background:rgba(79,195,247,.06);border:1px solid rgba(79,195,247,.15);border-radius:10px;text-align:center}
.gi-stat label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;display:block}
.gi-stat b{font-size:18px;font-weight:800}
.gi-stat b.g{color:#66bb6a}.gi-stat b.r{color:#ef5350}
.more{margin-top:12px}
.more h3{font-size:15px;font-weight:700;margin-bottom:10px}
.more-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px}
.more-gc{border-radius:var(--r);overflow:hidden;cursor:pointer;aspect-ratio:1;position:relative}
.more-gc img{width:100%;height:115%;object-fit:cover;position:absolute;top:0;left:0}
.more-gc:hover{transform:scale(1.03);box-shadow:0 6px 20px rgba(0,0,0,.3)}

/* FAVORITES */
.fp{position:fixed;top:0;right:0;width:280px;max-width:100vw;height:100dvh;background:var(--bg2);border-left:1px solid var(--border);z-index:200;overflow-y:auto;padding:16px;box-shadow:-4px 0 30px rgba(0,0,0,.4);animation:sIn .2s ease}
@keyframes sIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
.fp-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.fp-h h3{font-size:15px;font-weight:700}
.xb{background:0;border:0;color:var(--text2);cursor:pointer;padding:4px;border-radius:6px}
.xb:hover{background:var(--bg3);color:var(--text)}
.fi{display:flex;gap:8px;padding:6px;border-radius:8px;cursor:pointer;margin-bottom:3px;transition:background .1s}
.fi:hover{background:var(--accent-glow)}
.fi-img{width:48px;height:36px;border-radius:6px;overflow:hidden;flex-shrink:0}.fi-img img{width:100%;height:120%;object-fit:cover;display:block;margin-top:-10%}
.fi span{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* RESPONSIVE */
@media(min-width:560px){.game-grid{grid-template-columns:repeat(4,130px)}}
@media(min-width:700px){.game-grid{grid-template-columns:repeat(5,130px)}}
@media(min-width:840px){.game-grid{grid-template-columns:repeat(6,130px)}}
@media(min-width:980px){.game-grid{grid-template-columns:repeat(7,130px)}}
@media(min-width:1120px){.game-grid{grid-template-columns:repeat(8,130px)}}
@media(min-width:1260px){.game-grid{grid-template-columns:repeat(9,130px)}}
@media(min-width:1400px){.game-grid{grid-template-columns:repeat(10,130px)}}
@media(min-width:1540px){.game-grid{grid-template-columns:repeat(11,130px)}}
@media(min-width:1680px){.game-grid{grid-template-columns:repeat(12,130px)}}
@media(max-width:768px){.sidebar{display:none}.sb-mob{display:flex!important}}
@media(max-width:500px){
  .game-grid{grid-template-columns:repeat(3,1fr);grid-auto-rows:auto}
  .game-grid .gc{aspect-ratio:1}
  .col2,.col3{grid-column:span 2;grid-row:span 2}
  .srch{max-width:none}
}
.sb-mob{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(14,26,46,.98);backdrop-filter:blur(12px);border-top:1px solid var(--border);z-index:100;padding:6px 8px;gap:2px;overflow-x:auto;-ms-overflow-style:none;scrollbar-width:none}
.sb-mob::-webkit-scrollbar{display:none}
.sb-mob-item{padding:6px 12px;border-radius:16px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:inherit;font-size:11px;font-weight:600;white-space:nowrap;cursor:pointer;flex-shrink:0;transition:all .12s}
.sb-mob-item.active{background:var(--accent);border-color:var(--accent);color:#0a1628}
`;

function KhelABC(){
  const[pg,sP]=useState("home");const[gm,sG]=useState(null);const[q,sQ]=useState("");const[qf,sQf]=useState(false);

    sLikes(l=>({...l,[id]:(l[id]||0)+1}));return{...p,[id]:"like"}})},[]);

    if(cur==="like"){sLikes(l=>({...l,[id]:(l[id]||1)-1}))}

  useEffect(()=>{const h=e=>{if(sRef.current&&!sRef.current.contains(e.target))sQf(false)};document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h)},[]);

  return(<><style>{CSS}</style><div className="app">

        <input placeholder="Search games..." value={q} onChange={e=>sQ(e.target.value)} onFocus={()=>sQf(true)} onKeyDown={e=>{if(e.key==="Enter"&&q.trim()){playClick();sP("search");sQf(false)}}}/>
        {qf&&q.trim()&&res.length>0&&(
          <div className="sdd">{res.slice(0,8).map(g=><div key={g.id} className="sdi" onClick={()=>{open(g);sQ("");sQf(false)}}>
            <div className="sdi-img"><img src={g.i} alt=""/></div>
            <span>{g.t}</span>
          </div>)}</div>)}
      </div>

        {CATS.map(cat=>(
          <div key={cat.n} className={`sb-item ${activeCat===cat.n?"active":""}`}

            </div>

    {showLogin&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",backdropFilter:"blur(4px)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={()=>sLogin(false)}>
      <div style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:16,padding:24,maxWidth:360,width:"100%",boxShadow:"0 20px 60px rgba(0,0,0,.5)"}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
          <h3 style={{fontSize:18,fontWeight:700}}>Welcome</h3>
          <button className="xb" onClick={()=>sLogin(false)}><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
        </div>
