const CSS=`*{margin:0;padding:0;box-sizing:border-box}

.H-logo{display:flex;align-items:center;gap:6px;cursor:pointer;flex-shrink:0}

/* Game page */
.gp{animation:fu .2s ease}@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.gp-wrap{display:flex;gap:0}

.xb{background:0;border:0;color:var(--t2);cursor:pointer;padding:2px}.xb:hover{color:var(--t1)}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:center;justify-content:center;padding:12px}
.pp{background:var(--card);border:1px solid var(--bd);border-radius:var(--r);padding:18px;max-width:360px;width:100%;max-height:80vh;overflow-y:auto}
.pp-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}.pp-h h3{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700}
.fp{position:fixed;top:0;right:0;width:280px;max-width:100vw;height:100dvh;background:var(--card);border-left:1px solid var(--bd);z-index:200;overflow-y:auto;padding:52px 10px 10px;animation:sl .2s ease}

.smi{display:flex;gap:6px;padding:4px;border-radius:6px;cursor:pointer;margin-bottom:3px}.smi:hover{background:var(--hover)}
.smth{width:44px;height:33px;border-radius:5px;object-fit:cover;object-position:center top;flex-shrink:0;background:var(--card2);overflow:hidden}

.g-btn{display:flex;align-items:center;gap:8px;width:100%;padding:10px 14px;background:white;border:1px solid #ddd;border-radius:var(--r);cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;color:#333;margin:10px 0}
.home-wrap{display:flex;gap:10px;padding:0 10px 10px}

@media(max-width:380px){.grd{grid-template-columns:repeat(2,1fr);gap:4px;padding:4px}.cd.big{grid-column:span 2;grid-row:span 1}}
`;

            <div style={{marginTop:8}}><Ad h={50} l="AD BANNER"/></div>
            <div className="gd"><h2>{gm.t}</h2></div>
            <div className="gd" style={{marginTop:6}}><h2 style={{fontSize:13}}>More Games</h2>
              <div className="grd" style={{padding:0,marginTop:6,gridTemplateColumns:"repeat(auto-fill,minmax(100px,1fr))",gap:6}}>{sim.map(g=><Card key={g.id} g={{...g,big:false}} onClick={()=>open(g)}/>)}</div>
            </div>
          </div>
          <div className="gp-adr"><Ad w={140} h={360} l="AD"/></div>
        </div>
      </div>)}
    </div>
  </div>
  {/* Favorites */}
  {sf&&<div className="fp"><div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}><h3 style={{fontFamily:"'Space Grotesk'",fontSize:13,fontWeight:700}}>Favorites</h3><button className="xb" onClick={()=>sSf(false)}><I n="x" s={15}/></button></div>
    {fav.length===0?<div style={{textAlign:"center",padding:20,color:"var(--t3)",fontSize:11}}>No favorites yet</div>
    :fav.map(g=><div key={g.id} className="smi" onClick={()=>{open(g);sSf(false)}}><div className="smth"><img src={g.i} alt=""/></div><div style={{flex:1,minWidth:0}}><div className="smn">{g.t}</div></div></div>)}
  </div>}
  {/* Login */}
  {showLogin&&<div className="ov" onClick={()=>sLogin(false)}><div className="pp" onClick={e=>e.stopPropagation()} style={{textAlign:"center"}}>
    <div className="pp-h"><h3>Sign in</h3><button className="xb" onClick={()=>sLogin(false)}><I n="x" s={14}/></button></div>
    <button className="g-btn" onClick={()=>{sU({name:"Player",email:"player@gmail.com",initial:"P"});sLogin(false)}}><I n="google" s={15}/> Continue with Google</button>
  </div></div>}
  </div></>);
}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(Zonely));
</script>
</body>
</html>
