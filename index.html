const CSS=`*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a12;--s1:#0f0f1a;--s2:#161624;--s3:#1c1c30;--hover:#222240;--ac:#0ea5e9;--acl:#38bdf8;--acd:#0284c7;--acg:rgba(14,165,233,.18);--acs:rgba(14,165,233,.06);--t1:#e8eaf0;--t2:#8b8fa8;--t3:#4a4e68;--bd:rgba(255,255,255,.05);--sc:64px;--se:220px;--hh:50px;--r:8px}
html,body,#root{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t1);-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--s3);border-radius:4px}
.Z{display:flex;height:100dvh;overflow:hidden}
.M{flex:1;display:flex;flex-direction:column;min-width:0}.C{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
/* Sidebar */
.S{width:var(--sc);background:var(--s1);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden;transition:width .25s ease;flex-shrink:0;z-index:50}.S:hover{width:var(--se)}
.St{height:var(--hh);display:flex;align-items:center;padding:0 0 0 14px;gap:8px;flex-shrink:0;border-bottom:1px solid var(--bd);cursor:pointer;overflow:hidden}
.Sl{width:34px;height:34px;min-width:34px;background:linear-gradient(135deg,var(--ac),var(--acd));border-radius:var(--r);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 10px var(--acg)}
.Sn{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;white-space:nowrap;opacity:0;transition:opacity .2s}.S:hover .Sn{opacity:1}.Sn span{color:var(--acl)}
.mob-sb .Sn,.mob-sb .Sla,.mob-sb .Stx{opacity:1!important}
.Sb{flex:1;overflow-y:auto;padding:4px 0 16px}
.Sla{padding:12px 0 4px 16px;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);white-space:nowrap;opacity:0;transition:opacity .2s}.S:hover .Sla{opacity:1}
.Si{display:flex;align-items:center;gap:10px;height:36px;padding:0 12px 0 16px;cursor:pointer;transition:all .1s;white-space:nowrap;color:var(--t2);position:relative}
.Si:hover{background:var(--acs);color:var(--t1)}.Si.on{color:var(--acl);background:var(--acs)}
.Si.on::before{content:'';position:absolute;left:0;top:5px;bottom:5px;width:3px;background:var(--ac);border-radius:0 3px 3px 0}
.Sic{width:18px;min-width:18px;display:flex;align-items:center;justify-content:center}
.Stx{font-size:12px;font-weight:500;opacity:0;transition:opacity .2s}.S:hover .Stx{opacity:1}
.Sdv{height:1px;background:var(--bd);margin:5px 14px}
.Si[data-t]::after{content:attr(data-t);position:absolute;left:calc(var(--sc)+5px);top:50%;transform:translateY(-50%);padding:3px 8px;background:var(--s2);border:1px solid var(--bd);border-radius:5px;font-size:10px;color:var(--t1);white-space:nowrap;opacity:0;pointer-events:none;z-index:999;box-shadow:0 4px 12px rgba(0,0,0,.5)}
.S:not(:hover) .Si:hover::after{opacity:1}
.mob-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:998}
.mob-sb{position:fixed;left:0;top:0;bottom:0;width:260px;background:var(--s1);z-index:999;overflow-y:auto;animation:slR .2s ease;border-right:1px solid var(--bd)}
@keyframes slR{from{transform:translateX(-100%)}to{transform:translateX(0)}}
/* Header */
.H{height:var(--hh);background:var(--s1);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 10px;gap:8px;position:sticky;top:0;z-index:100}
.H-m{width:36px;height:36px;border-radius:var(--r);background:0;border:0;color:var(--t2);cursor:pointer;display:none;align-items:center;justify-content:center}
.H-logo{display:flex;align-items:center;gap:6px;cursor:pointer;flex-shrink:0;margin-right:2px}
.H-lt{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;white-space:nowrap}.H-lt span{color:var(--acl)}
.Hs{flex:1;max-width:440px;position:relative}
.Hs input{width:100%;height:36px;background:var(--s2);border:1px solid var(--bd);border-radius:18px;padding:0 12px 0 34px;color:var(--t1);font-family:inherit;font-size:12px;outline:0;transition:border .12s,box-shadow .12s}
.Hs input:focus{border-color:var(--ac);box-shadow:0 0 0 2px var(--acg)}.Hs input::placeholder{color:var(--t3)}
.Hsi{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--t3)}
.Sdd{position:absolute;top:calc(100%+4px);left:0;right:0;background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);max-height:340px;overflow-y:auto;z-index:200;box-shadow:0 10px 36px rgba(0,0,0,.5)}
.Sri{display:flex;align-items:center;gap:8px;padding:7px 10px;cursor:pointer;transition:background .1s}.Sri:hover{background:var(--hover)}
.Srt{width:48px;height:36px;border-radius:6px;object-fit:cover;background:var(--s2)}
.Ha{display:flex;align-items:center;gap:2px;flex-shrink:0}
.Hb{width:36px;height:36px;border-radius:var(--r);background:0;border:0;color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .1s;position:relative}
.Hb:hover{background:var(--s2);color:var(--acl)}.Hb .dot{position:absolute;top:6px;right:6px;width:5px;height:5px;background:var(--ac);border-radius:50%}
.Hp{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--ac),var(--acd));border:0;color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.dd{position:absolute;top:calc(100%+4px);right:0;background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);min-width:240px;z-index:300;box-shadow:0 10px 36px rgba(0,0,0,.5)}
.dd-h{padding:10px 12px;border-bottom:1px solid var(--bd);font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:space-between}
.dd-i{padding:8px 12px;font-size:12px;color:var(--t2);cursor:pointer;transition:background .1s;display:flex;align-items:center;gap:7px}.dd-i:hover{background:var(--hover);color:var(--t1)}
/* Cards - small like FreezeNova */
.cd{cursor:pointer;position:relative;border-radius:var(--r);overflow:hidden;background:var(--s2);transition:transform .15s,box-shadow .15s}
.cd:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.35),0 0 0 1px var(--acg);z-index:5}
@media(hover:none){.cd:hover{transform:none}.cd:active{transform:scale(.97)}}
.cd-img{width:100%;aspect-ratio:16/10;object-fit:cover;display:block;background:var(--s3)}
.cd-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.85) 0%,transparent 50%);opacity:0;transition:opacity .15s;display:flex;align-items:flex-end;padding:8px}
.cd:hover .cd-ov{opacity:1}
@media(hover:none){.cd .cd-ov{opacity:1;background:linear-gradient(to top,rgba(0,0,0,.6) 0%,transparent 40%)}}
.cd-pl{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:38px;height:38px;border-radius:50%;background:var(--ac);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;box-shadow:0 3px 14px var(--acg)}
.cd:hover .cd-pl{opacity:1}
@media(hover:none){.cd .cd-pl{width:30px;height:30px;opacity:.8}}
.cd-n{font-size:11px;font-weight:600;color:white}
.cd-b{padding:5px 7px}.cd-bn{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* Home grid (FreezeNova style - no carousel, full collage) */
.home-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;padding:12px}
.home-wrap{display:flex;gap:12px;padding:0 12px 12px}
.home-main{flex:1;min-width:0}
.home-ad{width:160px;flex-shrink:0;position:sticky;top:0;height:fit-content;padding-top:12px}
.cat-label{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;padding:14px 0 8px;display:flex;align-items:center;gap:6px}
.cat-label .gc{display:inline-flex;padding:1px 6px;background:var(--acs);border-radius:8px;font-size:9px;color:var(--acl);font-weight:600}
/* Game page with ads */
.gp{animation:fu .2s ease}@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.gp-wrap{display:flex;gap:0}
.gp-adl{width:160px;flex-shrink:0;padding:10px;display:flex;flex-direction:column;align-items:center;position:sticky;top:0;height:fit-content}
.gp-adr{width:160px;flex-shrink:0;padding:10px;display:flex;flex-direction:column;align-items:center;position:sticky;top:0;height:fit-content}
.gp-c{flex:1;min-width:0;padding:10px}
.gp-if{width:100%;aspect-ratio:16/9;background:#000;border-radius:var(--r);overflow:hidden;position:relative}
.gp-if iframe{width:100%;height:100%;border:0}.gp-if.fs{position:fixed;inset:0;z-index:9999;border-radius:0;aspect-ratio:unset}
.gp-ac{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.gb{display:flex;align-items:center;gap:5px;padding:6px 12px;background:var(--s2);border:1px solid var(--bd);border-radius:16px;color:var(--t1);cursor:pointer;font-family:inherit;font-size:11px;font-weight:500;transition:all .1s}
.gb:hover{background:var(--acs);border-color:var(--ac);color:var(--acl)}.gb.on{color:var(--ac);border-color:var(--ac);background:var(--acs)}
.gd{margin-top:12px;padding:14px;background:var(--s1);border-radius:var(--r);border:1px solid var(--bd)}
.gd h2{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;margin-bottom:6px}.gd p{font-size:12px;color:var(--t2);line-height:1.5}
.smi{display:flex;gap:7px;padding:5px;border-radius:var(--r);cursor:pointer;transition:background .1s;margin-bottom:3px}.smi:hover{background:var(--hover)}
.smth{width:48px;height:36px;border-radius:6px;object-fit:cover;flex-shrink:0;background:var(--s2)}
.smn{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.smc{font-size:9px;color:var(--t3);margin-top:1px}
.bk{display:flex;align-items:center;gap:5px;padding:7px 12px;background:0;border:0;color:var(--t2);cursor:pointer;font-family:inherit;font-size:12px;font-weight:500}.bk:hover{color:var(--acl)}
.xb{background:0;border:0;color:var(--t2);cursor:pointer;padding:3px}.xb:hover{color:var(--t1)}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:500;display:flex;align-items:center;justify-content:center;padding:14px}
.pp{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:20px;max-width:380px;width:100%;max-height:80vh;overflow-y:auto}
.pp-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}.pp-h h3{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700}
.fp{position:fixed;top:0;right:0;width:300px;max-width:100vw;height:100dvh;background:var(--s1);border-left:1px solid var(--bd);z-index:200;overflow-y:auto;padding:56px 12px 12px;animation:sl .2s ease}
@keyframes sl{from{transform:translateX(100%)}to{transform:translateX(0)}}
.g-btn{display:flex;align-items:center;gap:8px;width:100%;padding:10px 14px;background:white;border:1px solid #ddd;border-radius:var(--r);cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;color:#333;margin:12px 0}
.sr-pg{padding:12px}.sr-pg h2{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;margin-bottom:4px}.sr-pg p{color:var(--t3);margin-bottom:10px;font-size:12px}
@media(min-width:1200px){.home-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}}
@media(max-width:1100px){.gp-adl,.gp-adr,.home-ad{display:none}}
@media(max-width:860px){.S{display:none}.H-m{display:flex}}
@media(max-width:640px){.home-grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:6px;padding:8px}.H{padding:0 6px;gap:4px}.H-lt{display:none}.Sl{width:30px;height:30px;min-width:30px}.fp{width:100vw}.gp-c{padding:6px}.gb{padding:5px 10px;font-size:10px}}
@media(max-width:380px){.home-grid{grid-template-columns:repeat(3,1fr);gap:4px;padding:6px}.cd-b{padding:3px 5px}.cd-bn{font-size:10px}}
`;

const Card=({g,onClick})=><div className="cd" onClick={onClick}><img className="cd-img" src={g.i} alt={g.t} loading="lazy" onError={e=>{e.target.style.background="linear-gradient(135deg,#10101c,#0ea5e9)"}}/><div className="cd-ov"><div className="cd-pl"><I n="play" s={14} c="white"/></div><div className="cd-n">{g.t}</div></div><div className="cd-b"><div className="cd-bn">{g.t}</div></div></div>;

function Zonely(){
  const[pg,sP]=useState("home");const[gm,sG]=useState(null);const[q,sQ]=useState("");const[qf,sQf]=useState(false);const[cat,sC]=useState("all");
  const[fav,sF]=useState([]);const[sf,sSf]=useState(false);const[fs,sFs]=useState(false);const[lk,sLk]=useState({});
  const[user,sU]=useState(null);const[showLogin,sLogin]=useState(false);const[showNotif,sNotif]=useState(false);const[showProf,sProf]=useState(false);
  const[srPage,sSrP]=useState(false);const[srQ,sSrQ]=useState("");const[mob,sMob]=useState(false);
  const sRef=useRef(null);const cRef=useRef(null);
  const open=useCallback(g=>{sG(g);sP("game");sSf(false);sSrP(false);sMob(false);if(cRef.current)cRef.current.scrollTop=0},[]);
  const home=useCallback(()=>{sP("home");sG(null);sFs(false);sSrP(false);sMob(false)},[]);
  const tF=useCallback(g=>{sF(p=>p.find(f=>f.id===g.id)?p.filter(f=>f.id!==g.id):[...p,g])},[]);
  const isF=useCallback(id=>fav.some(f=>f.id===id),[fav]);
  const res=useMemo(()=>{const s=(srPage?srQ:q).toLowerCase().trim();if(!s)return[];return G.filter(g=>g.t.toLowerCase().includes(s)||g.tg.toLowerCase().includes(s)||g.c.some(c=>c.includes(s)))},[q,srQ,srPage]);
  const getG=useCallback((id)=>G.filter(g=>g.c.includes(id)),[]);
  const sim=useMemo(()=>{if(!gm)return[];return G.filter(g=>g.id!==gm.id&&g.c.some(c=>gm.c.includes(c))).slice(0,12)},[gm]);
  const doSearch=()=>{if(q.trim()){sSrQ(q);sSrP(true);sP("search");sQf(false);if(cRef.current)cRef.current.scrollTop=0}};
  useEffect(()=>{const h=e=>{if(sRef.current&&!sRef.current.contains(e.target))sQf(false);const hp=document.querySelector('.hp-wrap');if(hp&&!hp.contains(e.target)){sProf(false);sNotif(false)}};document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h)},[]);
  const signIn=()=>{sU({name:"Player",email:"player@gmail.com",initial:"P"});sLogin(false)};
  const isGrid=cat!=="all"&&pg==="home";const gridGames=isGrid?G.filter(g=>g.c.includes(cat)):[];
  const gridLabel=CATS.find(c=>c.id===cat)?.l||"";
  // Home sections (no carousel — all grids)
  const homeSections=[{id:"top-picks",l:"Top Picks"},{id:"featured",l:"Featured"},{id:"roblox",l:"Roblox Style"},{id:"new",l:"New Games"},{id:"cant-stop",l:"Can't Stop Playing"},{id:"shooting",l:"Shooting"},{id:"driving",l:"Driving"},{id:"puzzle",l:"Puzzle"},{id:"2-player",l:"2 Player"},{id:"sports",l:"Sports"},{id:"action",l:"Action"},{id:"io",l:"IO Games"},{id:"simulation",l:"Simulation"},{id:"clicker",l:"Clicker"},{id:"adventure",l:"Adventure"},{id:"multiplayer",l:"Multiplayer"},{id:"mobile",l:"Mobile"},{id:"friends",l:"With Friends"},{id:"fighting",l:"Fighting"}];

  const SB=()=>(<>
    <div className="St" onClick={()=>{sC("all");home()}}><div className="Sl"><Logo s={20}/></div><div className="Sn">Zone<span>ly</span></div></div>
    <div className="Sb">
      <div className="Sla">Navigate</div>
      {[{id:"all",n:"Home",ic:"home"},{id:"top-picks",n:"Trending",ic:"trending"},{id:"new",n:"New",ic:"clock"}].map(x=>
        <div key={x.id} className={`Si ${(x.id==="all"?(pg==="home"&&cat==="all"):cat===x.id&&pg==="home")?"on":""}`} data-t={x.n} onClick={()=>{sC(x.id==="all"?"all":x.id);sP("home");sG(null);sSrP(false);sMob(false);if(cRef.current)cRef.current.scrollTop=0}}>
          <div className="Sic"><I n={x.ic} s={15} c={(x.id==="all"?(pg==="home"&&cat==="all"):cat===x.id)?"#38bdf8":"#8b8fa8"}/></div><span className="Stx">{x.n}</span>
        </div>)}
      <div className="Sdv"/>
      <div className="Sla">Categories</div>
      {CATS.map(c=><div key={c.id} className={`Si ${cat===c.id&&pg==="home"?"on":""}`} data-t={c.l} onClick={()=>{sC(c.id);sP("home");sG(null);sSrP(false);sMob(false);if(cRef.current)cRef.current.scrollTop=0}}>
        <div className="Sic"><I n={c.ic} s={15} c={cat===c.id?"#38bdf8":"#8b8fa8"}/></div><span className="Stx">{c.l}</span>
      </div>)}
    </div></>);

  return(<><style>{CSS}</style><div className="Z">
    <nav className="S"><SB/></nav>
    {mob&&<><div className="mob-ov" onClick={()=>sMob(false)}/><nav className="mob-sb"><SB/></nav></>}
    <div className="M">
      <header className="H">
        <button className="H-m" onClick={()=>sMob(true)}><I n="menu" s={18}/></button>
        <div className="H-logo" onClick={()=>{sC("all");home()}}><div className="Sl"><Logo s={18}/></div><div className="H-lt">Zone<span>ly</span></div></div>
        <div className="Hs" ref={sRef}>
          <div className="Hsi"><I n="search" s={13}/></div>
          <input placeholder="Search games..." value={q} onChange={e=>sQ(e.target.value)} onFocus={()=>sQf(true)} onKeyDown={e=>{if(e.key==="Enter")doSearch()}}/>
          {qf&&q.trim()&&res.length>0&&!srPage&&(
            <div className="Sdd">{res.slice(0,6).map(g=>(<div key={g.id} className="Sri" onClick={()=>{open(g);sQ("")}}>
              <img className="Srt" src={g.i} alt="" onError={e=>{e.target.style.background="var(--s2)"}}/>
              <div style={{flex:1}}><div style={{fontSize:12,fontWeight:500}}>{g.t}</div><div style={{fontSize:10,color:"var(--t3)"}}>{g.c[0]}</div></div>
            </div>))}
            <div className="dd-i" style={{borderTop:"1px solid var(--bd)",justifyContent:"center",color:"var(--acl)",fontWeight:600,fontSize:11}} onClick={doSearch}><I n="search" s={11} c="#38bdf8"/> All {res.length} results</div></div>)}
        </div>
        <div className="Ha hp-wrap" style={{position:"relative"}}>
          <button className={`Hb`} onClick={()=>sSf(!sf)}><I n={sf?"heartFilled":"heart"} s={16} c={sf?"#0ea5e9":undefined}/>{fav.length>0&&<span className="dot"/>}</button>
          <button className="Hb" onClick={()=>{sNotif(!showNotif);sProf(false)}}><I n="bell" s={16}/><span className="dot"/></button>
          {showNotif&&<div className="dd" style={{right:32}}><div className="dd-h">Notifications<button className="xb" onClick={()=>sNotif(false)}><I n="x" s={14}/></button></div>
            <div className="dd-i"><I n="sparkle" s={12} c="#38bdf8"/>New games added!</div></div>}
          <button className="Hp" onClick={()=>{if(!user)sLogin(true);else{sProf(!showProf);sNotif(false)}}}>
            {user?user.initial:<I n="user" s={14} c="white"/>}</button>
          {showProf&&user&&<div className="dd" style={{right:0}}>
            <div className="dd-h" style={{gap:6}}><div style={{width:26,height:26,borderRadius:"50%",background:"linear-gradient(135deg,#0ea5e9,#0284c7)",display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:700,fontSize:11}}>{user.initial}</div><div style={{fontSize:12}}>{user.name}</div></div>
            <div className="dd-i" onClick={()=>{sSf(true);sProf(false)}}><I n="heart" s={12}/> Favorites</div>
            <div className="dd-i" style={{color:"#ef4444"}} onClick={()=>{sU(null);sProf(false)}}><I n="logout" s={12} c="#ef4444"/> Sign Out</div></div>}
        </div>
      </header>

      <div className="C" ref={cRef}>
        {/* HOME - Full collage grid like FreezeNova */}
        {pg==="home"&&!isGrid&&cat==="all"&&(
          <div className="home-wrap">
            <div className="home-main">
              {/* Top ad banner */}
              <div style={{padding:"10px 0"}}><Ad h={70} label="ADVERTISEMENT"/></div>
              {homeSections.filter(s=>getG(s.id).length>0).map(s=>(
                <div key={s.id}>
                  <div className="cat-label"><I n={CATS.find(c=>c.id===s.id)?.ic||"star"} s={14} c="#38bdf8"/> {s.l} <span className="gc">{getG(s.id).length}</span></div>
                  <div className="home-grid">{getG(s.id).map(g=><Card key={g.id} g={g} onClick={()=>open(g)}/>)}</div>
                </div>
              ))}
            </div>
            {/* Right ad sidebar */}
            <div className="home-ad"><Ad w={160} h={600} label="AD 160x600"/></div>
          </div>
        )}
        {/* Category page */}
        {pg==="home"&&isGrid&&(<div className="sr-pg">
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}><I n={CATS.find(c=>c.id===cat)?.ic||"star"} s={18} c="#38bdf8"/><h2>{gridLabel}</h2><span className="gc" style={{display:"inline-flex",padding:"1px 6px",background:"var(--acs)",borderRadius:8,fontSize:9,color:"var(--acl)",fontWeight:600}}>{gridGames.length}</span></div>
          <div className="home-grid">{gridGames.map(g=><Card key={g.id} g={g} onClick={()=>open(g)}/>)}</div>
        </div>)}
        {/* Search */}
        {pg==="search"&&srPage&&(<div className="sr-pg">
          <button className="bk" onClick={()=>{sSrP(false);sP("home");sC("all")}}><I n="arrowLeft" s={14}/> Back</button>
          <h2>"{srQ}"</h2><p>{res.length} games</p>
          {res.length>0?<div className="home-grid">{res.map(g=><Card key={g.id} g={g} onClick={()=>open(g)}/>)}</div>
          :<div style={{textAlign:"center",padding:30,color:"var(--t3)",fontSize:12}}>No games found.</div>}
        </div>)}
        {/* Game page with ad spaces */}
        {pg==="game"&&gm&&(<div className="gp">
          <button className="bk" onClick={()=>{if(srPage)sP("search");else home()}}><I n="arrowLeft" s={14}/> Back to Games</button>
          {/* Top ad */}
          <div style={{padding:"0 10px 8px"}}><Ad h={60} label="AD BANNER"/></div>
          <div className="gp-wrap">
            {/* Left ad */}
            <div className="gp-adl"><Ad w={140} h={400} label="AD"/></div>
            {/* Game center */}
            <div className="gp-c">
              <div className={`gp-if ${fs?"fs":""}`}>
                <iframe src={gm.e} title={gm.t} allow="autoplay; fullscreen; gamepad" sandbox="allow-scripts allow-same-origin allow-popups allow-forms"/>
                {fs&&<button style={{position:"absolute",top:6,right:6,zIndex:10000}} className="gb" onClick={()=>sFs(false)}><I n="shrink" s={12}/> Exit</button>}
              </div>
              <div className="gp-ac">
                <button className={`gb ${lk[gm.id]?"on":""}`} onClick={()=>sLk(p=>({...p,[gm.id]:!p[gm.id]}))}><I n={lk[gm.id]?"heartFilled":"thumbsUp"} s={12} c={lk[gm.id]?"#0ea5e9":undefined}/>{lk[gm.id]?"Liked":"Like"}</button>
                <button className={`gb ${isF(gm.id)?"on":""}`} onClick={()=>tF(gm)}><I n={isF(gm.id)?"heartFilled":"heart"} s={12} c={isF(gm.id)?"#0ea5e9":undefined}/>{isF(gm.id)?"Saved":"Save"}</button>
                <button className="gb" onClick={()=>{if(navigator.share)navigator.share({title:gm.t})}}><I n="share" s={12}/> Share</button>
                <button className="gb" onClick={()=>sFs(true)}><I n="maximize" s={12}/> Fullscreen</button>
              </div>
              {/* Bottom ad */}
              <div style={{marginTop:10}}><Ad h={70} label="AD BANNER"/></div>
              <div className="gd"><h2>{gm.t}</h2><p>{gm.tg}</p></div>
              <div className="gd" style={{marginTop:8}}><h2 style={{fontSize:14}}>Similar Games</h2>
                <div className="home-grid" style={{padding:0,marginTop:8}}>{sim.map(g=><Card key={g.id} g={g} onClick={()=>open(g)}/>)}</div>
              </div>
            </div>
            {/* Right ad */}
            <div className="gp-adr"><Ad w={140} h={400} label="AD"/></div>
          </div>
        </div>)}
      </div>
    </div>
    {/* Favorites */}
    {sf&&<div className="fp"><div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}><h3 style={{fontFamily:"'Space Grotesk'",fontSize:14,fontWeight:700}}>Favorites</h3><button className="xb" onClick={()=>sSf(false)}><I n="x" s={16}/></button></div>
      {fav.length===0?<div style={{textAlign:"center",padding:24,color:"var(--t3)",fontSize:12}}>No favorites yet</div>
      :fav.map(g=><div key={g.id} className="smi" onClick={()=>{open(g);sSf(false)}}><img className="smth" src={g.i} alt="" onError={e=>{e.target.style.background="var(--s2)"}}/><div style={{flex:1,minWidth:0}}><div className="smn">{g.t}</div></div></div>)}
    </div>}
    {/* Login */}
    {showLogin&&<div className="ov" onClick={()=>sLogin(false)}><div className="pp" onClick={e=>e.stopPropagation()} style={{textAlign:"center"}}>
      <div className="pp-h"><h3>Sign in</h3><button className="xb" onClick={()=>sLogin(false)}><I n="x" s={16}/></button></div>
      <button className="g-btn" onClick={signIn}><I n="google" s={16}/> Continue with Google</button>
    </div></div>}
  </div></>);
}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(Zonely));
</script>
