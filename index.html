    <div className="cd-ov"><div className="cd-pl"><I n="play" s={big?18:13} c="white"/></div><div className={`cd-n ${big?"big":""}`}>{g.t}</div></div>
  </div>

// Build zigzag rows from game list
function buildZigzag(games){
  const rows=[];let idx=0;let rev=false;
  while(idx<games.length){
    const bigGame=games[idx];
    const smalls=games.slice(idx+1,idx+7);
    if(bigGame)rows.push({big:bigGame,smalls,rev});
    idx+=7;rev=!rev;
  }
  return rows;
}

                <I n="thumbDown" s={13} c={myVote[gm.id]==="dislike"?"#f87171":undefined}/> Dislike <span className="cnt">{dislikes[gm.id]||0}</span>

              <button className={`gb ${isF(gm.id)?"on":""}`} onClick={()=>tF(gm)}><I n={isF(gm.id)?"heartFilled":"heart"} s={12} c={isF(gm.id)?"#60a5fa":undefined}/> {isF(gm.id)?"Saved":"Save"}</button>
              <button className="gb" onClick={()=>{playClick();if(navigator.share)navigator.share({title:gm.t})}}><I n="share" s={12}/> Share</button>
              <button className="gb" onClick={()=>{playClick();sFs(true)}}><I n="maximize" s={12}/> Fullscreen</button>
            </div>
            <div style={{marginTop:8}}><Ad h={50} l="AD BANNER BOTTOM"/></div>
            {/* Game info */}
            <div className="gd">
              <h2>{gm.t}</h2>
              <p>{gm.d}</p>
              <div style={{display:"flex",gap:12,marginTop:10,flexWrap:"wrap"}}>
                <div style={{padding:"6px 12px",background:"rgba(59,130,246,.1)",border:"1px solid rgba(59,130,246,.2)",borderRadius:8}}>
                  <div style={{fontSize:9,color:"var(--t3)",textTransform:"uppercase",letterSpacing:1}}>Likes</div>
                  <div style={{fontSize:16,fontWeight:700,color:"var(--acl)"}}>{likes[gm.id]||0}</div>
                </div>
                <div style={{padding:"6px 12px",background:"rgba(248,113,113,.08)",border:"1px solid rgba(248,113,113,.15)",borderRadius:8}}>
                  <div style={{fontSize:9,color:"var(--t3)",textTransform:"uppercase",letterSpacing:1}}>Dislikes</div>
                  <div style={{fontSize:16,fontWeight:700,color:"#fca5a5"}}>{dislikes[gm.id]||0}</div>
                </div>
              </div>
            </div>
            {/* Similar games */}
            <div className="gd" style={{marginTop:8}}>
              <h2 style={{fontSize:14}}>More Games</h2>
              <div className="sim-grid">{sim.map(g=><Card key={g.id} g={{...g,big:false}} onClick={()=>open(g)}/>)}</div>
            </div>
          </div>
          <div className="gp-adr"><Ad w={140} h={400} l="AD RIGHT"/></div>
        </div>
      </div>)}
    </div>

    {/* Favorites */}
    {sf&&<div className="fp"><div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}><h3 style={{fontFamily:"'Space Grotesk'",fontSize:13,fontWeight:700}}>Favorites</h3><button className="xb" onClick={()=>{playClick();sSf(false)}}><I n="x" s={15}/></button></div>
      {fav.length===0?<div style={{textAlign:"center",padding:20,color:"var(--t3)",fontSize:11}}>No favorites yet</div>
      :fav.map(g=><div key={g.id} className="smi" onClick={()=>{open(g);sSf(false)}}><div className="smth"><img src={g.i} alt=""/></div><div style={{flex:1,minWidth:0}}><div className="smn">{g.t}</div></div></div>)}
    </div>}
    {/* Login */}
    {showLogin&&<div className="ov" onClick={()=>sLogin(false)}><div className="pp" onClick={e=>e.stopPropagation()} style={{textAlign:"center"}}>
      <div className="pp-h"><h3>Sign in</h3><button className="xb" onClick={()=>sLogin(false)}><I n="x" s={14}/></button></div>
      <button className="g-btn" onClick={()=>{playLike();sU({name:"Player",initial:"P"});sLogin(false)}}><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg> Continue with Google</button>
    </div></div>}
  </div></>);
}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(KhelABC));
</script>
